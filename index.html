<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи - Битви та ШІ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            background: #16161a;
            padding: 12px 24px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2a2a30;
            z-index: 10;
        }

        .panel-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
        }

        .mil-stats { color: #94a3b8; }
        .warning-stats { color: #ef4444 !important; animation: blink 1s infinite alternate; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        select {
            background-color: #222227;
            color: white;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn {
            background-color: #222227;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .mode-btn.civ-mode.active { background-color: #f97316; border-color: #fb923c; box-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
        .mode-btn.mil-mode.active { background-color: #64748b; border-color: #94a3b8; box-shadow: 0 0 10px rgba(100, 116, 139, 0.5); }

        .map-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer;
            stroke: #111113;
            stroke-width: 0.6px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover, svg polygon:hover, svg rect:hover { opacity: 0.85; stroke: #ffffff; }

        /* Фабрики */
        .factory-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        .factory-indicator.civ { background-color: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
        .factory-indicator.mil { background-color: #64748b; box-shadow: 0 0 6px #64748b; border-radius: 2px; }

        /* Дивізії */
        .division-indicator {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #10b981;
            filter: drop-shadow(0 0 4px #10b981);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .division-indicator.selected { border-bottom-color: #ffff00; filter: drop-shadow(0 0 6px #ffff00); }
        
        /* Колір трикутників ШІ (ворогів) */
        .division-indicator.ai-unit { border-bottom-color: #ef4444; filter: drop-shadow(0 0 4px #ef4444); }

        /* Індикатор битви */
        .battle-indicator {
            position: absolute;
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid #ffffff;
            transform: translate(-50%, -160%);
            pointer-events: none;
            z-index: 8;
            box-shadow: 0 0 8px #ef4444;
            white-space: nowrap;
        }

        .arrows-layer {
            position: absolute;
            top: 10px; left: 10px;
            width: calc(100% - 20px); height: calc(100% - 20px);
            pointer-events: none; z-index: 4;
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія - Фронт та ШІ</h1>
    <p>Нападайте на ворожі провінції. Дивізії мають 100 ОЗ і б'ються в реальному часі. ШІ ворогів теж атакує!</p>

    <div class="control-panel">
        <div class="panel-section">
            <label for="country-select">Ваша країна:</label>
            <select id="country-select">
                <option value="UA">Україна (UA)</option>
                <option value="PL">Польща (PL)</option>
                <option value="DE">Німеччина (DE)</option>
                <option value="FR">Франція (FR)</option>
            </select>
        </div>

        <div class="panel-section stats">
            Монети: <span id="coins-display">150</span> (<span id="income-display">+0</span>/с)
        </div>

        <div class="panel-section stats mil-stats" id="mil-panel">
            Військові фабрики: <span id="mil-display">0/0</span>
        </div>

        <div class="panel-section">
            <button id="btn-army" class="mode-btn active">Режим: Стрільці</button>
            <button id="btn-civ" class="mode-btn civ-mode">Будувати: Цивільна ф-ка</button>
            <button id="btn-mil" class="mode-btn mil-mode">Будувати: Військова ф-ка</button>
        </div>
    </div>

    <div id="map-container" class="map-container">
        <svg id="arrows-layer" class="arrows-layer"></svg>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const arrowsLayer = document.getElementById('arrows-layer');
        const coinsDisplay = document.getElementById('coins-display');
        const incomeDisplay = document.getElementById('income-display');
        const milDisplay = document.getElementById('mil-display');
        const milPanel = document.getElementById('mil-panel');
        
        const btnArmy = document.getElementById('btn-army');
        const btnCiv = document.getElementById('btn-civ');
        const btnMil = document.getElementById('btn-mil');
        const countrySelect = document.getElementById('country-select');

        // Економіка та глобальні змінні країн
        let coins = 150;
        let currentMode = 'army';
        let playerCountry = countrySelect.value;
        let selectedProvinceId = null;

        const MAX_NEIGHBOR_DISTANCE = 180; 
        const MS_PER_PIXEL = 100; // Повільна швидкість руху

        const countryColors = {
            'UA': '#1d4ed8', 'PL': '#b91c1c', 'DE': '#374151', 'FR': '#0284c7', 'NEUTRAL': '#2e2e35'
        };

        // Стан бюджетів для ШІ ботів
        const countryBudgets = { 'UA': 150, 'PL': 150, 'DE': 150, 'FR': 150 };
        
        const provinceData = {}; 

        countrySelect.addEventListener('change', function() {
            playerCountry = this.value;
            cancelSelection();
            updateEconomyDisplay();
        });

        btnArmy.addEventListener('click', () => { currentMode = 'army'; resetActiveButtons(); btnArmy.classList.add('active'); cancelSelection(); });
        btnCiv.addEventListener('click', () => { currentMode = 'build_civ'; resetActiveButtons(); btnCiv.classList.add('active'); cancelSelection(); });
        btnMil.addEventListener('click', () => { currentMode = 'build_mil'; resetActiveButtons(); btnMil.classList.add('active'); cancelSelection(); });

        function resetActiveButtons() {
            btnArmy.classList.remove('active'); btnCiv.classList.remove('active'); btnMil.classList.remove('active');
        }

        // Завантаження карти
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgData, 'image/svg+xml');
                const importedSvg = svgDoc.querySelector('svg');
                container.insertBefore(importedSvg, arrowsLayer);

                const mapLayer = document.getElementById('Layer_x0020_1') || importedSvg;

                if (mapLayer) {
                    setupArrowMarker();

                    const allElements = mapLayer.querySelectorAll('path, polygon, polyline, rect, ellipse');
                    allElements.forEach(element => {
                        if (!element.id) element.id = 'prov_' + Math.random().toString(36).substr(2, 5);
                        const id = element.id;
                        let detectedCountry = 'NEUTRAL';

                        for (const code in countryColors) {
                            if (id.endsWith('_' + code) || id.endsWith(code)) {
                                detectedCountry = code;
                                break;
                            }
                        }

                        provinceData[id] = {
                            country: detectedCountry,
                            civFactories: 0,
                            milFactories: 0,
                            hasDivision: false,
                            isMoving: false,
                            divisionHp: 0,        // Поточне ОЗ дивізії
                            divisionOwner: null,  // Якій країні належить дивізія
                            elementRef: element,
                            domDivisionRef: null
                        };

                        element.style.fill = countryColors[detectedCountry];
                    });

                    updateEconomyDisplay();

                    // Кліки гравця
                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        const target = event.target;
                        if (!validTags.includes(target.tagName.toLowerCase())) return;
                        
                        const provinceId = target.id;
                        const province = provinceData[provinceId];
                        if (!province || province.isMoving) return;

                        if (currentMode === 'build_civ' || currentMode === 'build_mil') {
                            if (province.country !== playerCountry) return alert("Тільки на своїй території!");
                            if ((province.civFactories + province.milFactories) >= 3) return alert("Немає вільних слотів (макс 3)!");

                            if (currentMode === 'build_civ') {
                                province.civFactories++; createFactoryVisual(target, provinceId, 'civ');
                            } else {
                                province.milFactories++; createFactoryVisual(target, provinceId, 'mil');
                            }
                            updateEconomyDisplay();
                        } 
                        else if (currentMode === 'army') {
                            if (province.country === playerCountry) {
                                if (province.hasDivision && province.divisionOwner === playerCountry) {
                                    cancelSelection();
                                    selectedProvinceId = provinceId;
                                    province.domDivisionRef.classList.add('selected');
                                } else if (!province.hasDivision) {
                                    if (selectedProvinceId && selectedProvinceId !== provinceId) {
                                        tryMoveOrAttack(selectedProvinceId, provinceId, playerCountry);
                                    } else if (coins >= 50) {
                                        coins -= 50; coinsDisplay.textContent = coins;
                                        spawnDivisionVisual(provinceId, playerCountry);
                                        updateEconomyDisplay();
                                    }
                                }
                            } else {
                                if (selectedProvinceId) {
                                    tryMoveOrAttack(selectedProvinceId, provinceId, playerCountry);
                                }
                            }
                        }
                    });
                }
            });

        function setupArrowMarker() {
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
            marker.setAttribute("id", "arrowhead"); marker.setAttribute("viewBox", "0 0 10 10");
            marker.setAttribute("refX", "5"); marker.setAttribute("refY", "5");
            marker.setAttribute("markerWidth", "6"); marker.setAttribute("markerHeight", "6");
            marker.setAttribute("orient", "auto-start-reverse");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M 0 0 L 10 5 L 0 10 z"); path.setAttribute("fill", "#f59e0b");
            marker.appendChild(path); defs.appendChild(marker); arrowsLayer.appendChild(defs);
        }

        function getProvinceCenter(id) {
            const rect = provinceData[id].elementRef.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            return {
                x: rect.left - containerRect.left + (rect.width / 2),
                y: rect.top - containerRect.top + (rect.height / 2)
            };
        }

        function tryMoveOrAttack(fromId, toId, countryCode) {
            const start = getProvinceCenter(fromId);
            const end = getProvinceCenter(toId);
            const distance = Math.sqrt(Math.pow(end.x - start.x, 2) + Math.pow(end.y - start.y, 2));

            if (distance > MAX_NEIGHBOR_DISTANCE) {
                if (countryCode === playerCountry) alert("Рухатися можна тільки в сусідні провінції.");
                cancelSelection(); return;
            }

            // Якщо провінція своя і там уже є юніт, рух заблоковано
            if (provinceData[toId].hasDivision && provinceData[toId].divisionOwner === countryCode) {
                cancelSelection(); return;
            }

            const travelTime = distance * MS_PER_PIXEL;
            executeOrderWithArrow(fromId, toId, start, end, travelTime, countryCode);
        }

        function executeOrderWithArrow(fromId, toId, start, end, duration, countryCode) {
            const fromProv = provinceData[fromId];
            const toProv = provinceData[toId];
            
            fromProv.isMoving = true;
            if (countryCode === playerCountry) cancelSelection();

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const bgLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            bgLine.setAttribute("x1", start.x); bgLine.setAttribute("y1", start.y);
            bgLine.setAttribute("x2", end.x); bgLine.setAttribute("y2", end.y);
            bgLine.setAttribute("stroke", "rgba(245, 158, 11, 0.2)"); bgLine.setAttribute("stroke-width", "4");

            const progressLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            progressLine.setAttribute("x1", start.x); progressLine.setAttribute("y1", start.y);
            progressLine.setAttribute("x2", start.x); progressLine.setAttribute("y2", start.y);
            progressLine.setAttribute("stroke", countryCode === playerCountry ? "#f59e0b" : "#ef4444");
            progressLine.setAttribute("stroke-width", "4"); progressLine.setAttribute("marker-end", "url(#arrowhead)");

            g.appendChild(bgLine); g.appendChild(progressLine); arrowsLayer.appendChild(g);

            const startTime = performance.now();
            const divEl = fromProv.domDivisionRef;
            const movingHp = fromProv.divisionHp; // Зберігаємо ОЗ під час маршу

            // Очищуємо стартову провінцію негайно
            fromProv.hasDivision = false; fromProv.domDivisionRef = null; fromProv.divisionHp = 0; fromProv.divisionOwner = null;
            fromProv.isMoving = false;

            function animateMove(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const currentX = start.x + (end.x - start.x) * progress;
                const currentY = start.y + (end.y - start.y) * progress;

                progressLine.setAttribute("x2", currentX); progressLine.setAttribute("y2", currentY);
                if (divEl) { divEl.style.left = `${currentX}px`; divEl.style.top = `${currentY}px`; }

                if (progress < 1) {
                    requestAnimationFrame(animateMove);
                } else {
                    g.remove();
                    resolveArrival(toId, countryCode, movingHp, divEl);
                }
            }
            requestAnimationFrame(animateMove);
        }

        // Обробка прибуття: Мирний вхід або Бій
        function resolveArrival(toId, attackerCountry, attackerHp, divEl) {
            const targetProv = provinceData[toId];

            // 1. МИРНИЙ ВХІД (Провінція порожня)
            if (!targetProv.hasDivision) {
                targetProv.hasDivision = true;
                targetProv.divisionHp = attackerHp;
                targetProv.divisionOwner = attackerCountry;
                targetProv.domDivisionRef = divEl;

                // Якщо зайшли на чужу/нейтральну землю — анексія
                if (targetProv.country !== attackerCountry) {
                    targetProv.country = attackerCountry;
                    targetProv.elementRef.style.fill = countryColors[attackerCountry];
                }
                updateEconomyDisplay();
            } 
            // 2. СИСТЕМА БОЮ (Там стоїть ворог)
            else if (targetProv.hasDivision && targetProv.divisionOwner !== attackerCountry) {
                startBattle(toId, attackerCountry, attackerHp, divEl);
            } else {
                // Якщо за час маршу туди став свій юніт, атакуючий просто розпускається
                if (divEl) divEl.remove();
            }
        }

        // Функція проведення бою в реальному часі
        function startBattle(provId, attackerCountry, attackerHp, attackerDivEl) {
            const prov = provinceData[provId];
            const defenderCountry = prov.divisionOwner;

            // Створюємо плашку бою над провінцією
            const center = getProvinceCenter(provId);
            const battleHtml = document.createElement('div');
            battleHtml.className = 'battle-indicator';
            container.appendChild(battleHtml);

            let attHp = attackerHp;

            const battleInterval = setInterval(() => {
                // Кожні 0.5с юніти б'ють один одного (Атака 20 + випадковість)
                const dmgToDef = Math.floor(Math.random() * 15) + 10;
                const dmgToAtt = Math.floor(Math.random() * 15) + 10;

                prov.divisionHp -= dmgToDef;
                attHp -= dmgToAtt;

                // Оновлюємо текст плашки бою
                battleHtml.style.left = `${center.x}px`;
                battleHtml.style.top = `${center.y}px`;
                battleHtml.textContent = `${attackerCountry}: ${Math.max(0, attHp)} VS ${defenderCountry}: ${Math.max(0, prov.divisionHp)}`;

                // Перевірка на завершення бою
                if (prov.divisionHp <= 0 || attHp <= 0) {
                    clearInterval(battleInterval);
                    battleHtml.remove();

                    // Обоє загинули або захисник вистояв
                    if (prov.divisionHp <= 0 && attHp <= 0) {
                        if (prov.domDivisionRef) prov.domDivisionRef.remove();
                        if (attackerDivEl) attackerDivEl.remove();
                        prov.hasDivision = false; prov.domDivisionRef = null; prov.divisionOwner = null;
                    } 
                    // Захисник переміг
                    else if (prov.divisionHp > 0 && attHp <= 0) {
                        if (attackerDivEl) attackerDivEl.remove();
                        console.log(`Захисники (${defenderCountry}) відбили атаку в ${provId}!`);
                    } 
                    // Атакуючий переміг (Захоплення)
                    else if (attHp > 0 && prov.divisionHp <= 0) {
                        if (prov.domDivisionRef) prov.domDivisionRef.remove();
                        
                        prov.country = attackerCountry;
                        prov.elementRef.style.fill = countryColors[attackerCountry];
                        
                        prov.hasDivision = true;
                        prov.divisionHp = attHp;
                        prov.divisionOwner = attackerCountry;
                        prov.domDivisionRef = attackerDivEl;

                        // Якщо це був юніт гравця — міняємо стиль на зелений, якщо ШІ — на червоний
                        if (attackerCountry === playerCountry) {
                            attackerDivEl.classList.remove('ai-unit');
                        } else {
                            attackerDivEl.classList.add('ai-unit');
                        }

                        console.log(`Країна ${attackerCountry} захопила провінцію ${provId}!`);
                    }
                    updateEconomyDisplay();
                }
            }, 500);
        }

        function spawnDivisionVisual(id, countryCode) {
            const center = getProvinceCenter(id);
            const divEl = document.createElement('div');
            divEl.className = 'division-indicator';
            if (countryCode !== playerCountry) divEl.classList.add('ai-unit');
            
            divEl.style.left = `${center.x}px`; divEl.style.top = `${center.y}px`;
            container.appendChild(divEl);
            
            provinceData[id].hasDivision = true;
            provinceData[id].divisionHp = 100; // 100 ОЗ на старті
            provinceData[id].divisionOwner = countryCode;
            provinceData[id].domDivisionRef = divEl;
        }

        function createFactoryVisual(svgElement, id, type) {
            const rect = svgElement.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            const factory = document.createElement('div');
            factory.className = `factory-indicator ${type}`;
            const totalBuilt = provinceData[id].civFactories + provinceData[id].milFactories;
            const offsetX = (totalBuilt - 2) * 11; 

            factory.style.left = `${centerX + offsetX}px`; factory.style.top = `${centerY + 14}px`; 
            container.appendChild(factory);
        }

        function cancelSelection() {
            selectedProvinceId = null;
            document.querySelectorAll('.division-indicator').forEach(el => el.classList.remove('selected'));
        }

        // Економічні розрахунки
        function updateEconomyDisplay() {
            // Оновлюємо баланси всіх ШІ країн пасивно
            for (const code in countryBudgets) {
                let civs = 0;
                for (const pId in provinceData) {
                    if (provinceData[pId].country === code) civs += provinceData[pId].civFactories;
                }
                countryBudgets[code] += civs * 5; 
            }

            // Розрахунок конкретно для гравця
            let totalCiv = 0; let totalMil = 0; let totalDivisions = 0;
            for (const id in provinceData) {
                if (provinceData[id].country === playerCountry) {
                    totalCiv += provinceData[id].civFactories;
                    totalMil += provinceData[id].milFactories;
                    if (provinceData[id].hasDivision && provinceData[id].divisionOwner === playerCountry) totalDivisions++;
                }
            }

            let rawIncome = totalCiv * 5;
            let logisticsPenalty = totalDivisions > totalMil ? (totalDivisions - totalMil) * 3 : 0;
            if (totalDivisions > totalMil) milPanel.classList.add('warning-stats'); else milPanel.classList.remove('warning-stats');

            let finalIncome = rawIncome - logisticsPenalty;
            incomeDisplay.textContent = (finalIncome >= 0 ? `+${finalIncome}` : `${finalIncome}`);
            milDisplay.textContent = `${totalDivisions}/${totalMil}`;
            
            window.currentCalculatedIncome = finalIncome;
            coinsDisplay.textContent = coins;
        }

        // Таймер доходів (1 секунда)
        setInterval(function() {
            if (typeof window.currentCalculatedIncome !== 'undefined') {
                coins += window.currentCalculatedIncome;
                if (coins < 0) coins = 0;
                coinsDisplay.textContent = coins;
            }
        }, 1000);

        // --- БАЗОВИЙ Штучний Інтелект ВОРОГІВ (Кожні 5 секунд) ---
        setInterval(function() {
            const countries = ['UA', 'PL', 'DE', 'FR'];
            
            countries.forEach(bot => {
                if (bot === playerCountry) return; // Пропускаємо країну гравця

                // 1. Збір провінцій бота
                const botProvinces = [];
                for (const pId in provinceData) {
                    if (provinceData[pId].country === bot) botProvinces.push(pId);
                }
                if (botProvinces.length === 0) return;

                // 2. Логіка витрачання монет ботом
                let botCash = countryBudgets[bot];

                if (botCash >= 50) {
                    // Вибираємо випадкову свою провінцію
                    const randProvId = botProvinces[Math.floor(Math.random() * botProvinces.length)];
                    const prov = provinceData[randProvId];

                    // ШІ купує дивізію, якщо там порожньо
                    if (!prov.hasDivision && !prov.isMoving) {
                        spawnDivisionVisual(randProvId, bot);
                        countryBudgets[bot] -= 50;
                    } 
                    // Або будує фабрику, якщо є вільні слоти
                    else if ((prov.civFactories + prov.milFactories) < 3) {
                        if (Math.random() > 0.5) {
                            prov.civFactories++; createFactoryVisual(prov.elementRef, randProvId, 'civ');
                        } else {
                            prov.milFactories++; createFactoryVisual(prov.elementRef, randProvId, 'mil');
                        }
                        updateEconomyDisplay();
                    }
                }

                // 3. Логіка Атаки/Переміщення ШІ (шанс 40%)
                if (Math.random() < 0.4) {
                    // Шукаємо провінцію бота, де вже стоїть його готова армія
                    const armedProvinces = botProvinces.filter(pId => provinceData[pId].hasDivision && provinceData[pId].divisionOwner === bot && !provinceData[pId].isMoving);
                    
                    if (armedProvinces.length > 0) {
                        const attackFrom = armedProvinces[Math.floor(Math.random() * armedProvinces.length)];
                        
                        // Шукаємо ВСІ провінції на карті, щоб знайти якусь близьку (сусідню)
                        const allProvIds = Object.keys(provinceData);
                        const targets = allProvIds.filter(pId => {
                            if (pId === attackFrom) return false;
                            const start = getProvinceCenter(attackFrom);
                            const end = getProvinceCenter(pId);
                            const dist = Math.sqrt(Math.pow(end.x - start.x, 2) + Math.pow(end.y - start.y, 2));
                            // Ціль має бути сусідом і не належати самому боту
                            return dist <= MAX_NEIGHBOR_DISTANCE && provinceData[pId].country !== bot;
                        });

                        // Якщо знайшли сусідів — ШІ атакує!
                        if (targets.length > 0) {
                            const attackTo = targets[Math.floor(Math.random() * targets.length)];
                            tryMoveOrAttack(attackFrom, attackTo, bot);
                        }
                    }
                }
            });
        }, 5000);
    });
</script>
