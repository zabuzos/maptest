<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D HOI4 Mini Strategy - Firebase Map Editor</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden;
            background-color: #0c0c0e; color: #ffffff; font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* Стартовий екран вибору країни */
        .start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #09090b; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; box-sizing: border-box; padding: 20px;
        }
        .start-screen h2 { margin: 0; font-size: 26px; color: #fff; letter-spacing: 1px; text-align: center; }
        
        .country-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
            width: 100%;
            max-width: 1000px; 
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
            background: #111115;
            border-radius: 8px;
            border: 1px solid #232329;
        }
        
        .country-select-btn {
            background: #16161a; border: 2px solid #2d2d35; color: white; padding: 12px 15px;
            font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s;
            text-align: left; display: flex; align-items: center; gap: 8px;
        }
        .country-select-btn:hover { border-color: #3b82f6; background: #1c1c22; transform: translateY(-2px); }

        .game-layout { display: flex; width: 100%; height: 100vh; }

        .sidebar {
            width: 360px; min-width: 360px; background: #16161a; border-right: 2px solid #2a2a30;
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px;
            z-index: 10; overflow-y: auto;
        }

        .sidebar h1 { margin: 0; font-size: 18px; color: #fff; }
        .sidebar p { margin: 0; color: #8a8a93; font-size: 11px; line-height: 1.4; }

        .panel-section {
            display: flex; flex-direction: column; gap: 5px; background: #1c1c22;
            padding: 10px; border-radius: 6px; border: 1px solid #2d2d35;
        }

        .panel-section label { font-size: 10px; color: #8a8a93; text-transform: uppercase; letter-spacing: 1px; }
        .stats { font-size: 13px; font-weight: bold; color: #ffd700; }
        .oil-stats { color: #38bdf8; }
        .mil-stats { color: #94a3b8; }

        .player-badge {
            font-size: 14px; font-weight: bold; padding: 5px; border-radius: 4px; text-align: center; color: white;
        }

        .actions-grid { display: flex; flex-direction: column; gap: 6px; }

        .mode-btn {
            background-color: #2a2a33; color: #fff; border: 1px solid #444; padding: 8px;
            cursor: pointer; border-radius: 4px; font-weight: 600; text-align: left; transition: all 0.2s; width: 100%;
            font-size: 11px;
        }

        .mode-btn.active { background-color: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .mode-btn.tank-mode.active { background-color: #0284c7; border-color: #38bdf8; }
        .mode-btn.civ-mode.active { background-color: #f97316; border-color: #fb923c; }
        .mode-btn.mil-mode.active { background-color: #64748b; border-color: #94a3b8; }
        .mode-btn.bunker-mode.active { background-color: #4b5563; border-color: #9ca3af; }
        .mode-btn.editor-mode.active { background-color: #eab308; border-color: #facc15; color: #000; }

        .dip-btn {
            background-color: #2e2a38; border: 1px solid #a855f7; color: #e9d5ff;
            padding: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center;
        }

        .tech-slot-box {
            background: #25252e; border: 1px dashed #4b4b5e; border-radius: 4px; padding: 6px; margin-top: 4px;
            font-size: 11px; display: flex; flex-direction: column; gap: 3px;
        }
        .tech-progress-bar { width: 100%; height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
        .tech-progress-fill { width: 0%; height: 100%; background: #a855f7; transition: width 0.2s linear; }
        
        .tech-select-grid { display: grid; grid-template-columns: 1fr; gap: 4px; max-height: 120px; overflow-y: auto; }
        .tech-card {
            background: #272730; border: 1px solid #3f3f4e; border-radius: 4px; padding: 6px; font-size: 11px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }

        .map-area { flex-grow: 1; position: relative; background-color: #050507; overflow: hidden; cursor: grab; }
        .map-area:active { cursor: grabbing; }
        
        .map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        .map-container svg { width: 100%; height: 100%; display: block; }

        .zoom-controls {
            position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 6px; z-index: 100;
        }
        .zoom-btn {
            background: #1e1e24; color: white; border: 1px solid #3d3d45; width: 36px; height: 36px;
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; display: flex;
            align-items: center; justify-content: center;
        }

        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer; stroke: #111113; stroke-width: 0.6px; transition: opacity 0.15s ease;
        }
        svg path:hover, svg polygon:hover, svg rect:hover { opacity: 0.85; stroke: #ffffff; }

        .factory-indicator { position: absolute; width: 5px; height: 5px; border: 0.5px solid #ffffff; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); }
        .oil-deposit-mark { position: absolute; font-size: 7px; pointer-events: none; transform: translate(-50%, -50%); color: #38bdf8; font-weight: bold; }
        .division-indicator { position: absolute; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 9px solid #10b981; pointer-events: none; transform: translate(-50%, -50%); z-index: 5; }
        .arrows-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.9); z-index: 10000; display: none;
            align-items: center; justify-content: center;
        }
        .focus-tree-window {
            background: #141419; border: 2px solid #a855f7; border-radius: 12px;
            width: 100%; max-width: 900px; height: 85vh; display: flex; flex-direction: column; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="start-screen" id="start-screen">
        <h2>Оберіть свою націю або увійдіть в режим редактора</h2>
        <button id="quick-editor-bypass-btn" style="background: #eab308; color: #000; border: none; font-weight: bold; padding: 12px 25px; border-radius: 6px; cursor: pointer;">🛠️ Ввійти відразу в Редактор Кордонів</button>
        <div class="country-grid" id="start-country-grid"></div>
    </div>

    <div class="game-layout">
        <div class="sidebar">
            <div>
                <h1>2D HOI4 Mini Strategy</h1>
                <p>Керуйте військами, досліджуйте технології та змінюйте глобальні кордони!</p>
            </div>

            <div class="panel-section">
                <label>Ваша нація</label>
                <div id="player-flag-badge" class="player-badge" style="background:#2e2e35;">Не обрано (Режим редактора)</div>
            </div>

            <div class="panel-section">
                <label>Економіка та Ресурси</label>
                <div class="stats">Монети: <span id="coins-display">150</span></div>
                <div class="stats oil-stats">Нафта: <span id="oil-display">10</span> б.</div>
            </div>

            <div class="panel-section">
                <label>Режими дій</label>
                <div class="actions-grid">
                    <button id="btn-army" class="mode-btn">⚔️ Стрільці (50💰)</button>
                    <button id="btn-tank" class="mode-btn tank-mode">🚜 Легкі Танки (120💰)</button>
                    <button id="btn-civ" class="mode-btn civ-mode">🏗️ Цивільна ф-ка</button>
                    <button id="btn-mil" class="mode-btn mil-mode">🏭 Військ/Нафта</button>
                    <button id="btn-bunker" class="mode-btn bunker-mode">🛡️ Бункер</button>
                    
                    <button id="btn-editor" class="mode-btn editor-mode active" style="border: 1px dashed #eab308;">🛠️ Редактор кордонів (Firebase)</button>
                    <div id="editor-subpanel" style="display:flex; flex-direction:column; gap:4px; margin-top:2px;">
                        <label style="font-size:9px; color:#facc15;">Яку країну малювати:</label>
                        <select id="editor-country-select" style="background:#272730; color:white; border:1px solid #eab308; padding:6px; font-size:12px; border-radius:4px; cursor:pointer;"></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="map-area" id="map-area">
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoom-in">+</button>
                <button class="zoom-btn" id="zoom-out">-</button>
            </div>
            <div id="map-container" class="map-container">
                <svg id="arrows-layer" class="arrows-layer"></svg>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 🛠️ НАЛАШТУВАННЯ FIREBASE (ВСТАВ СВОЇ КЛЮЧІ СЮДИ)
    // ==========================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Ініціалізація
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    // ==========================================

    document.addEventListener("DOMContentLoaded", function() {
        const startScreen = document.getElementById('start-screen');
        const startGrid = document.getElementById('start-country-grid');
        const playerBadge = document.getElementById('player-flag-badge');
        const quickEditorBtn = document.getElementById('quick-editor-bypass-btn');
        
        const mapArea = document.getElementById('map-area');
        const container = document.getElementById('map-container');
        const arrowsLayer = document.getElementById('arrows-layer');
        const coinsDisplay = document.getElementById('coins-display');
        const oilDisplay = document.getElementById('oil-display');
        
        const btnArmy = document.getElementById('btn-army');
        const btnTank = document.getElementById('btn-tank');
        const btnCiv = document.getElementById('btn-civ');
        const btnMil = document.getElementById('btn-mil');
        const btnBunker = document.getElementById('btn-bunker');
        const btnEditor = document.getElementById('btn-editor');
        const editorSubpanel = document.getElementById('editor-subpanel');
        const editorCountrySelect = document.getElementById('editor-country-select');

        let coins = 150;
        let playerOil = 10;
        let currentMode = 'editor'; // За замовчуванням увімкнено редактор
        let playerCountry = null; 
        let isGameStarted = false;
        let selectedProvinceId = null;
        let isFirebaseMapLoaded = false;

        let zoomScale = 1.0;
        let panX = 0; panY = 0;
        let isDragging = false;
        let startX, startY;
        let dragThreshold = false; // Визначає, чи ми рухали карту, чи просто клікнули

        const countryColors = { 
            'UA': '#1d4ed8', 'PL': '#b91c1c', 'DE': '#374151', 'FR': '#0284c7', 
            'GB': '#7c3aed', 'IT': '#15803d', 'SOV': '#991b1b', 'ES': '#b45309', 
            'RO': '#eab308', 'TR': '#0d9488', 'US': '#1e3a8a', 'JP': '#9a3412', 
            'FI': '#67e8f9', 'SE': '#eab308', 'NO': '#0f766e', 'DK': '#be123c', 
            'NL': '#ea580c', 'BE': '#854d0e', 'CH': '#ef4444', 'AT': '#f43f5e', 
            'CZ': '#0369a1', 'HU': '#16a34a', 'BG': '#047857', 'YU': '#4338ca', 
            'GR': '#06b6d4', 'PT': '#15803d', 'IE': '#166534', 'BY': '#4e7a43', 
            'LT': '#c29b00', 'LV': '#7a2b2d', 'EE': '#467599', 'AL': '#901a1e', 
            'MD': '#9a7b56', 'LU': '#38bdf8', 'NEUTRAL': '#2e2e35' 
        };

        const countryNames = {
            'UA': '🇺🇦 Україна', 'PL': '🇵🇱 Польща', 'DE': '🇩🇪 Німеччина', 'FR': '🇫🇷 Франція',
            'GB': '🇬🇧 Велика Британія', 'IT': '🇮🇹 Італія', 'SOV': '🇷🇺 СРСР', 'ES': '🇪🇸 Іспанія', 
            'RO': '🇷🇴 Румунія', 'TR': '🇹🇷 Туреччина', 'US': '🇺🇸 США', 'JP': '🇯🇵 Японія', 
            'FI': '🇫🇮 Фінляндія', 'SE': '🇸🇪 Швеція', 'NO': '🇳🇴 Норвегія', 'DK': '🇩𝕜 Данія', 
            'NL': '🇳🇱 Нідерланди', 'BE': '🇧🇪 Бельгія', 'CH': '🇨🇭 Швейцарія', 'AT': '🇦🇹 Австрія', 
            'CZ': '🇨🇿 Чехословаччина', 'HU': '🇭🇺 Угорщина', 'BG': '🇧🇬 Болгарія', 'YU': '🪕 Югославія', 
            'GR': '🇬🇷 Греція', 'PT': '🇵🇹 Португалія', 'IE': '🇮🇪 Ірландія', 'BY': '🇧🇾 Білорусь', 
            'LT': '🇱🇹 Литва', 'LV': '🇱🇻 Латвія', 'EE': '🇪🇪 Естонія', 'AL': '🇦🇱 Албанія', 
            'MD': '🇲🇩 Молдова', 'LU': '🇱🇺 Люксембург', 'NEUTRAL': '🏳️ Нейтральні'
        };

        const tagToCountry = {
            'UA': 'UA', 'UKR': 'UA', 'PL': 'PL', 'POL': 'PL', 'DE': 'DE', 'GER': 'DE',
            'FR': 'FR', 'FRA': 'FR', 'GB': 'GB', 'UK': 'GB', 'ENG': 'GB', 'GBR': 'GB',
            'IT': 'IT', 'ITA': 'IT', 'SOV': 'SOV', 'RU': 'SOV', 'RUS': 'SOV', 'BY': 'BY',
            'RO': 'RO', 'ROM': 'RO', 'MD': 'MD', 'FI': 'FI', 'FIN': 'FI', 'LT': 'LT', 'LV': 'LV', 'EE': 'EE'
        };

        const provinceData = {}; 

        // Створення кнопок націй
        Object.keys(countryNames).forEach(code => {
            if (code === 'NEUTRAL') return;
            const btn = document.createElement('button');
            btn.className = 'country-select-btn'; btn.setAttribute('data-code', code);
            btn.style.borderLeft = `5px solid ${countryColors[code] || '#fff'}`; btn.textContent = countryNames[code];
            startGrid.appendChild(btn);
        });

        // Створення списку для селекту в редакторі
        Object.keys(countryNames).forEach(code => {
            const opt = document.createElement('option');
            opt.value = code; opt.textContent = countryNames[code];
            if(code === 'UA') opt.selected = true;
            editorCountrySelect.appendChild(opt);
        });

        // Оновлення трансформації карти
        function updateMapTransform() { container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`; }

        // Драг карти
        mapArea.addEventListener('mousedown', function(e) {
            if (e.target.closest('.zoom-controls') || e.target.closest('.sidebar')) return;
            isDragging = true; dragThreshold = false; startX = e.clientX - panX; startY = e.clientY - panY;
        });
        window.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            dragThreshold = true; // Якщо мишка рухалась хоч трохи — це перетягування, а не клік
            panX = e.clientX - startX; panY = e.clientY - startY; updateMapTransform();
        });
        window.addEventListener('mouseup', function() { isDragging = false; });

        // Зум коліщатком
        mapArea.addEventListener('wheel', function(e) {
            e.preventDefault();
            const rect = mapArea.getBoundingClientRect();
            const mX = e.clientX - rect.left; const mY = e.clientY - rect.top;
            const mapX = (mX - panX) / zoomScale; const mapY = (mY - panY) / zoomScale;
            if (e.deltaY < 0) zoomScale = Math.min(zoomScale * 1.15, 5); else zoomScale = Math.max(zoomScale / 1.15, 0.3);
            panX = mX - mapX * zoomScale; panY = mY - mapY * zoomScale; updateMapTransform();
        }, { passive: false });

        document.getElementById('zoom-in').addEventListener('click', () => { zoomScale = Math.min(zoomScale * 1.25, 5); updateMapTransform(); });
        document.getElementById('zoom-out').addEventListener('click', () => { zoomScale = Math.max(zoomScale / 1.25, 0.3); updateMapTransform(); });

        // Перемикання режимів кнопок
        function setMode(mode, btnEl) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            editorSubpanel.style.display = (mode === 'editor') ? 'flex' : 'none';
        }

        btnArmy.addEventListener('click', () => setMode('army', btnArmy));
        btnTank.addEventListener('click', () => setMode('tank', btnTank));
        btnCiv.addEventListener('click', () => setMode('build_civ', btnCiv));
        btnMil.addEventListener('click', () => setMode('build_mil', btnMil));
        btnBunker.addEventListener('click', () => setMode('build_bunker', btnBunker));
        btnEditor.addEventListener('click', () => setMode('editor', btnEditor));

        // ЗАВАНТАЖЕННЯ КАРТИ ТА СИНХРОНІЗАЦІЯ
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgData, 'image/svg+xml');
                const importedSvg = svgDoc.querySelector('svg');
                container.insertBefore(importedSvg, arrowsLayer);
                const mapLayer = document.getElementById('Layer_x0020_1') || importedSvg;

                if (mapLayer) {
                    const allElements = mapLayer.querySelectorAll('path, polygon, polyline, rect, ellipse');
                    
                    allElements.forEach(element => {
                        if (!element.id) element.id = 'prov_' + Math.random().toString(36).substr(2, 5);
                        
                        const idUpper = element.id.toUpperCase();
                        let detectedCountry = 'NEUTRAL';

                        const idParts = idUpper.split(/[^A-Z]/).filter(Boolean);
                        for (const part of idParts) {
                            if (tagToCountry[part]) { detectedCountry = tagToCountry[part]; break; }
                        }

                        provinceData[element.id] = {
                            country: detectedCountry, civFactories: 0, milFactories: 0, oilWells: 0, bunkers: 0,
                            elementRef: element
                        };
                        element.style.fill = countryColors[detectedCountry] || '#2e2e35';
                    });

                    // Слухач бази Firebase
                    database.ref('global_map/provinces').on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            for (const provId in data) {
                                if (provinceData[provId]) {
                                    const newCountry = data[provId];
                                    provinceData[provId].country = newCountry;
                                    provinceData[provId].elementRef.style.fill = countryColors[newCountry] || '#2e2e35';
                                }
                            }
                        }
                        isFirebaseMapLoaded = true;
                    });

                    // ГОЛОВНИЙ ОБРОБНИК КЛІКУ ПО КАРТІ
                    mapLayer.addEventListener('click', function(event) {
                        // Якщо ми просто тягнули карту — ігноруємо клік
                        if (isDragging || dragThreshold) return; 

                        const target = event.target;
                        if (!['path', 'polygon', 'polyline', 'rect', 'ellipse'].includes(target.tagName.toLowerCase())) return;
                        
                        const provinceId = target.id;
                        const province = provinceData[provinceId];
                        if (!province) return;

                        // ⚡ 1. Перевірка режиму редактора (працює завжди, навіть без вибору країни)
                        if (currentMode === 'editor') {
                            const selectedTargetCountry = editorCountrySelect.value;
                            // Фарбуємо локально відразу для швидкості відгуку
                            province.country = selectedTargetCountry;
                            target.style.fill = countryColors[selectedTargetCountry] || '#2e2e35';
                            
                            // Зберігаємо в хмару назавжди
                            database.ref('global_map/provinces/' + provinceId).set(selectedTargetCountry)
                                .catch(err => console.error("Помилка запису в Firebase: ", err));
                            return; 
                        }

                        // ⚡ 2. Звичайний ігровий процес (вимагає старту гри)
                        if (!isGameStarted) return;

                        if (currentMode.startsWith('build_')) {
                            if (province.country !== playerCountry) return alert("Будувати можна лише на своїй території!");
                            if (coins < 30) return alert(`Недостатньо монет!`);
                            coins -= 30; coinsDisplay.textContent = coins;
                            alert(`Побудовано в ${provinceId}`);
                        } 
                    });
                }
            }).catch(err => alert("Помилка завантаження файлу map.svg. Переконайся, що він лежить в тій же папці!"));

        // Швидкий вхід в редактор
        quickEditorBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            setMode('editor', btnEditor);
        });

        // Вибір країни для гри
        document.body.onclick = function(e) {
            let btn = e.target.closest('.country-select-btn');
            if(btn) {
                playerCountry = btn.getAttribute('data-code');
                playerBadge.textContent = countryNames[playerCountry];
                playerBadge.style.backgroundColor = countryColors[playerCountry];
                startScreen.style.display = 'none'; 
                isGameStarted = true;
                setMode('army', btnArmy); // перемикаємо на війська при старті
                coinsDisplay.textContent = coins;
                oilDisplay.textContent = playerOil;
            }
        };
    });
</script>
</body>
</html>
