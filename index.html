<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        .map-container {
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        /* Стилі для провінцій, які завантажаться з файлу */
        svg path {
            cursor: pointer;
            stroke: #222222;
            stroke-width: 0.5px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover {
            opacity: 0.75;
            stroke: #ffffff;
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія</h1>
    <p>Карта завантажується окремо з файлу map.svg...</p>

    <div id="map-container" class="map-container"></div>

   <script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const targetColor = "#555555"; // Колір захопленої провінції (сірий)

        // 1. Завантажуємо зовнішній файл карти map.svg
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                // Вставляємо вміст SVG прямо в наш HTML-контейнер
                container.innerHTML = svgData;

                // 2. Шукаємо головний шар, який створив CorelDRAW
                const mapLayer = document.getElementById('Layer_x0020_1');

                if (mapLayer) {
                    // 3. Слухаємо кліки на ВСІ можливі типи векторних фігур
                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        
                        if (validTags.includes(event.target.tagName.toLowerCase())) {
                            // Фарбуємо фігуру, на яку клікнули
                            event.target.style.fill = targetColor;
                            
                            // Виводимо її ID в консоль браузера (F12 -> Console)
                            console.log("Захоплено об'єкт з ID: " + event.target.id);
                        }
                    });
                } else {
                    console.error("Помилка: Не вдалося знайти шар карти 'Layer_x0020_1' всередині вашого SVG.");
                }
            })
            .catch(error => {
                console.error("Помилка завантаження файлу карти:", error);
                container.innerHTML = "<p style='color:red;'>Не вдалося завантажити карту map.svg. Перевірте, чи лежить файл у тій же папці.</p>";
            });
    });
</script>
</body>
</html>
