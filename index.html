<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            background: #16161a;
            padding: 12px 24px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2a2a30;
        }

        .panel-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        select {
            background-color: #222227;
            color: white;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn {
            background-color: #222227;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .mode-btn.build-mode.active {
            background-color: #f97316;
            border-color: #fb923c;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .map-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer;
            stroke: #111113;
            stroke-width: 0.6px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover, svg polygon:hover, svg rect:hover {
            opacity: 0.85;
            stroke: #ffffff;
        }

        /* Візуальні заводи (помаранчеві кола) */
        .factory-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f59e0b;
            border: 1px solid #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #f59e0b;
        }

        /* Візуальні дивізії стрільців (зелені трикутники) */
        .division-indicator {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #10b981; /* Зелений */
            filter: drop-shadow(0 0 4px #10b981);
            pointer-events: none;
            transform: translate(-50%, -100%);
            transition: left 0.3s ease, top 0.3s ease;
        }

        /* Стиль для підсвічування обраної дивізії */
        .division-indicator.selected {
            border-bottom-color: #ffff00; /* Жовтий коли обрано */
            filter: drop-shadow(0 0 6px #ffff00);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -100%) scale(1); }
            to { transform: translate(-50%, -100%) scale(1.2); }
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія</h1>
    <p>Наймайте стрільців (50 монет), виділяйте їх кліком та атакуйте сусідні провінції.</p>

    <div class="control-panel">
        <div class="panel-section">
            <label for="country-select">Ваша країна:</label>
            <select id="country-select">
                <option value="UA">Україна (UA)</option>
                <option value="PL">Польща (PL)</option>
                <option value="DE">Німеччина (DE)</option>
                <option value="FR">Франція (FR)</option>
            </select>
        </div>

        <div class="panel-section stats">
            Монети: <span id="coins-display">150</span> (<span id="income-display">+0</span>/с)
        </div>

        <div class="panel-section">
            <button id="btn-army" class="mode-btn active">Режим: Стрільці (Військо)</button>
            <button id="btn-build" class="mode-btn build-mode">Режим: Промисловість</button>
        </div>
    </div>

    <div id="map-container" class="map-container"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const coinsDisplay = document.getElementById('coins-display');
        const incomeDisplay = document.getElementById('income-display');
        const btnArmy = document.getElementById('btn-army');
        const btnBuild = document.getElementById('btn-build');
        const countrySelect = document.getElementById('country-select');

        // Базові налаштування
        let coins = 150; // Дамо трохи більше на старт для найму
        let currentMode = 'army'; // 'army' або 'build'
        let playerCountry = countrySelect.value;
        let selectedProvinceId = null; // ID провінції, з якої хочемо рухати війська

        const countryColors = {
            'UA': '#1d4ed8', 'PL': '#b91c1c', 'DE': '#374151', 'FR': '#0284c7', 'NEUTRAL': '#2e2e35'
        };
        
        const provinceData = {}; 

        countrySelect.addEventListener('change', function() {
            playerCountry = this.value;
            selectedProvinceId = null;
            clearSelectionVisuals();
            updateIncomeDisplay();
        });

        btnArmy.addEventListener('click', () => { currentMode = 'army'; btnArmy.classList.add('active'); btnBuild.classList.remove('active'); });
        btnBuild.addEventListener('click', () => { currentMode = 'build'; btnBuild.classList.add('active'); btnArmy.classList.remove('active'); selectedProvinceId = null; clearSelectionVisuals(); });

        // 1. Завантаження мапи
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                container.innerHTML = svgData;
                const mapLayer = document.getElementById('Layer_x0020_1') || container.querySelector('svg');

                if (mapLayer) {
                    const allElements = mapLayer.querySelectorAll('path, polygon, polyline, rect, ellipse');
                    
                    allElements.forEach(element => {
                        if (!element.id) element.id = 'prov_' + Math.random().toString(36).substr(2, 5);
                        const id = element.id;
                        let detectedCountry = 'NEUTRAL';

                        for (const code in countryColors) {
                            if (id.endsWith('_' + code) || id.endsWith(code)) {
                                detectedCountry = code;
                                break;
                            }
                        }

                        provinceData[id] = {
                            country: detectedCountry,
                            factories: 0,
                            hasDivision: false,
                            elementRef: element, // посилання на SVG фігуру
                            domDivisionRef: null // посилання на HTML трикутник армії
                        };

                        element.style.fill = countryColors[detectedCountry];
                    });

                    updateIncomeDisplay();

                    // 2. Логіка кліків
                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        const target = event.target;
                        
                        if (!validTags.includes(target.tagName.toLowerCase())) return;
                        
                        const provinceId = target.id;
                        const province = provinceData[provinceId];
                        if (!province) return;

                        // --- РЕЖИМ ПРОМИСЛОВОСТІ ---
                        if (currentMode === 'build') {
                            if (province.country !== playerCountry) {
                                alert("Будувати можна тільки на власній території!");
                                return;
                            }
                            if (province.factories < 3) {
                                province.factories++;
                                createFactoryVisual(target, provinceId);
                                updateIncomeDisplay();
                            } else {
                                alert("Максимум 3 заводи!");
                            }
                        } 
                        
                        // --- РЕЖИМ СТРІЛЬЦІВ (НАЙМ / РУХ / АТАКА) ---
                        else if (currentMode === 'army') {
                            
                            // Якщо клікнули на СВОЮ провінцію
                            if (province.country === playerCountry) {
                                
                                // Якщо там вже Є дивізія — вибираємо її для дії
                                if (province.hasDivision) {
                                    clearSelectionVisuals();
                                    selectedProvinceId = provinceId;
                                    province.domDivisionRef.classList.add('selected');
                                    console.log("Дивізію вибрано. Оберіть ціль для руху чи атаки.");
                                } 
                                // Якщо там НЕМАЄ дивізії — пропонуємо найняти
                                else {
                                    // Якщо перед цим була вибрана інша дивізія, переміщуємо її сюди (рух всередині країни)
                                    if (selectedProvinceId && selectedProvinceId !== provinceId) {
                                        moveDivision(selectedProvinceId, provinceId);
                                    } else {
                                        // Інакше — купуємо нову
                                        if (coins >= 50) {
                                            coins -= 50;
                                            coinsDisplay.textContent = coins;
                                            spawnDivisionVisual(provinceId);
                                            console.log("Найнято дивізію стрільців!");
                                        } else {
                                            alert("Недостатньо монет для найму дивізії (потрібно 50)!");
                                        }
                                    }
                                }
                            } 
                            // Якщо клікнули на ЧУЖУ/НЕЙТРАЛЬНУ провінцію
                            else {
                                // Якщо у нас була обрана дивізія — АТАКА!
                                if (selectedProvinceId) {
                                    attackProvince(selectedProvinceId, provinceId);
                                } else {
                                    alert("Ця територія вам не належить. Виберіть свою дивізію, щоб атакувати її.");
                                }
                            }
                        }
                    });
                }
            });

        // Створення заводу
        function createFactoryVisual(svgElement, id) {
            const rect = svgElement.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            const factory = document.createElement('div');
            factory.className = 'factory-indicator';
            const offsetX = (provinceData[id].factories - 2) * 11; 

            factory.style.left = `${centerX + offsetX}px`;
            factory.style.top = `${centerY + 10}px`; // трохи змістимо вниз, щоб не заважати армії
            container.appendChild(factory);
        }

        // Візуалізація появи дивізії
        function spawnDivisionVisual(id) {
            const province = provinceData[id];
            const rect = province.elementRef.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            const divEl = document.createElement('div');
            divEl.className = 'division-indicator';
            divEl.style.left = `${centerX}px`;
            divEl.style.top = `${centerY - 5}px`; // по центру

            container.appendChild(divEl);
            
            province.hasDivision = true;
            province.domDivisionRef = divEl;
        }

        // Переміщення дивізії (між своїми)
        function moveDivision(fromId, toId) {
            const fromProv = provinceData[fromId];
            const toProv = provinceData[toId];

            if (toProv.hasDivision) {
                alert("Провінція призначення вже зайнята іншим військом!");
                return;
            }

            // Перераховуємо координати нової провінції
            const rect = toProv.elementRef.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            // Анімуємо та переносимо DOM-елемент
            const divEl = fromProv.domDivisionRef;
            divEl.style.left = `${centerX}px`;
            divEl.style.top = `${centerY - 5}px`;

            toProv.domDivisionRef = divEl;
            toProv.hasDivision = true;

            // Очищуємо стару провінцію
            fromProv.hasDivision = false;
            fromProv.domDivisionRef = null;

            clearSelectionVisuals();
            console.log("Дивізію переміщено.");
        }

        // Атака та захоплення території
        function attackProvince(fromId, targetId) {
            const fromProv = provinceData[fromId];
            const targetProv = provinceData[targetId];

            // Зміна власника провінції
            targetProv.country = playerCountry;
            targetProv.elementRef.style.fill = countryColors[playerCountry];

            // Якщо на ворожій території була дивізія — вона знищується (спрощена механіка)
            if (targetProv.hasDivision && targetProv.domDivisionRef) {
                targetProv.domDivisionRef.remove();
                targetProv.hasDivision = false;
            }

            // Переміщуємо нашу переможну дивізію на захоплену землю
            moveDivision(fromId, targetId);
            
            console.log(`Перемога! Провінція ${targetId} перейшла під контроль ${playerCountry}`);
            updateIncomeDisplay();
        }

        // Скидання виділення з усіх армій
        function clearSelectionVisuals() {
            selectedProvinceId = null;
            document.querySelectorAll('.division-indicator').forEach(el => {
                el.classList.remove('selected');
            });
        }

        // Економіка
        function calculatePlayerIncome() {
            let totalFactories = 0;
            for (const id in provinceData) {
                if (provinceData[id].country === playerCountry) {
                    totalFactories += provinceData[id].factories;
                }
            }
            return totalFactories * 5; 
        }

        function updateIncomeDisplay() {
            incomeDisplay.textContent = `+${calculatePlayerIncome()}`;
        }

        setInterval(function() {
            coins += calculatePlayerIncome();
            coinsDisplay.textContent = coins;
        }, 1000);
    });
</script>
</body>
</html>
