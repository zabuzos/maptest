<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        /* Ігрова панель управління */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            background: #16161a;
            padding: 12px 24px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2a2a30;
        }

        .panel-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        label {
            font-size: 14px;
            color: #8a8a93;
            font-weight: 600;
        }

        select {
            background-color: #222227;
            color: white;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn {
            background-color: #222227;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .mode-btn.build-mode.active {
            background-color: #f97316;
            border-color: #fb923c;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .map-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        /* Налаштування векторних елементів */
        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer;
            stroke: #111113;
            stroke-width: 0.6px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover, svg polygon:hover, svg rect:hover {
            opacity: 0.85;
            stroke: #ffffff;
        }

        /* Візуальні заводи на карті */
        .factory-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f59e0b;
            border: 1px solid #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #f59e0b;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія</h1>
    <p>Оберіть свою країну, розширюйте кордони та розбудовуйте власну промисловість.</p>

    <!-- Ігрова панель -->
    <div class="control-panel">
        <div class="panel-section">
            <label for="country-select">Ваша країна:</label>
            <select id="country-select">
                <option value="UA">Україна (UA)</option>
                <option value="PL">Польща (PL)</option>
                <option value="DE">Німеччина (DE)</option>
                <option value="FR">Франція (FR)</option>
            </select>
        </div>

        <div class="panel-section stats">
            Монети: <span id="coins-display">0</span> (<span id="income-display">+0</span>/с)
        </div>

        <div class="panel-section">
            <button id="btn-capture" class="mode-btn active">Режим: Експансія</button>
            <button id="btn-build" class="mode-btn build-mode">Режим: Промисловість</button>
        </div>
    </div>

    <div id="map-container" class="map-container"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const coinsDisplay = document.getElementById('coins-display');
        const incomeDisplay = document.getElementById('income-display');
        const btnCapture = document.getElementById('btn-capture');
        const btnBuild = document.getElementById('btn-build');
        const countrySelect = document.getElementById('country-select');

        // Ігрові налаштування
        let coins = 100; // Початковий капітал
        let currentMode = 'capture'; 
        let playerCountry = countrySelect.value; // Поточна країна гравця

        // Палітра кольорів для різних країн
        const countryColors = {
            'UA': '#1d4ed8', // Синій
            'PL': '#b91c1c', // Червоний
            'DE': '#374151', // Сіро-чорний
            'FR': '#0284c7', // Блакитний
            'NEUTRAL': '#2e2e35' // Колір для інших/нейтральних провінцій
        };
        
        // Головна база даних провінцій
        const provinceData = {}; 

        // Слідкуємо за зміною обраної країни гравцем
        countrySelect.addEventListener('change', function() {
            playerCountry = this.value;
            console.log("Ви змінили країну на: " + playerCountry);
            updateIncomeDisplay(); // Перераховуємо дохід саме нашої країни
        });

        // Перемикання режимів
        btnCapture.addEventListener('click', () => {
            currentMode = 'capture';
            btnCapture.classList.add('active');
            btnBuild.classList.remove('active');
        });

        btnBuild.addEventListener('click', () => {
            currentMode = 'build';
            btnBuild.classList.add('active');
            btnCapture.classList.remove('active');
        });

        // 1. Завантаження мапи SVG
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                container.innerHTML = svgData;
                const mapLayer = document.getElementById('Layer_x0020_1') || container.querySelector('svg');

                if (mapLayer) {
                    // Автоматично скануємо та фарбуємо початкову карту
                    const allElements = mapLayer.querySelectorAll('path, polygon, polyline, rect, ellipse');
                    
                    allElements.forEach(element => {
                        // Якщо ID немає — створюємо випадковий
                        if (!element.id) {
                            element.id = 'province_' + Math.random().toString(36).substr(2, 5) + '_UNKNOWN';
                        }

                        const id = element.id;
                        let detectedCountry = 'NEUTRAL';

                        // Визначаємо країну за закінченням ID (наприклад, lviv_UA -> UA)
                        for (const code in countryColors) {
                            if (id.endsWith('_' + code) || id.endsWith(code)) {
                                detectedCountry = code;
                                break;
                            }
                        }

                        // Записуємо провінцію в ігрову базу даних
                        provinceData[id] = {
                            country: detectedCountry,
                            factories: 0
                        };

                        // Фарбуємо у відповідний колір
                        element.style.fill = countryColors[detectedCountry];
                    });

                    updateIncomeDisplay();

                    // 2. Обробник кліків по карті
                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        const target = event.target;
                        
                        if (validTags.includes(target.tagName.toLowerCase())) {
                            const provinceId = target.id;
                            const province = provinceData[provinceId];

                            if (!province) return;

                            // --- РЕЖИМ ЕКСПАНСІЇ (ЗАХОПЛЕННЯ) ---
                            if (currentMode === 'capture') {
                                if (province.country === playerCountry) {
                                    console.log("Ця провінція вже ваша!");
                                    return;
                                }

                                // Захоплюємо провінцію: міняємо власника та колір
                                province.country = playerCountry;
                                target.style.fill = countryColors[playerCountry];
                                
                                console.log(`Провінцію ${provinceId} інтегровано до складу ${playerCountry}`);
                                updateIncomeDisplay();
                            } 
                            
                            // --- РЕЖИМ ПРОМИСЛОВОСТІ (БУДІВНИЦТВО) ---
                            else if (currentMode === 'build') {
                                // Перевірка: чи належить провінція країні, за яку ми граємо
                                if (province.country !== playerCountry) {
                                    alert(`Ви не можете будувати тут! Ця територія належить: ${province.country}. Оберіть провінцію своєї країни.`);
                                    return;
                                }

                                // Вартість будівництва (за бажанням, зараз безкоштовно, або можна додати умову з монетами)
                                if (province.factories < 3) {
                                    province.factories++;
                                    createFactoryVisual(target, provinceId);
                                    console.log(`Будівництво завершено в ${provinceId}. Заводів: ${province.factories}`);
                                    updateIncomeDisplay();
                                } else {
                                    alert("У цій провінції більше немає місця для фабрик (максимум 3)!");
                                }
                            }
                        }
                    });
                } else {
                    console.error("Помилка обробки шарів мапи.");
                }
            })
            .catch(error => {
                console.error("Помилка файлу карти:", error);
                container.innerHTML = "<p style='color:red;'>Файл map.svg не знайдено або заблоковано CORS.</p>";
            });

        // Функція для створення візуальних точок-заводів
        function createFactoryVisual(svgElement, id) {
            const rect = svgElement.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            const factory = document.createElement('div');
            factory.className = 'factory-indicator';
            
            // Зсув для кількох заводів в одній локації
            const factoryCount = provinceData[id].factories;
            const offsetX = (factoryCount - 2) * 11; 

            factory.style.left = `${centerX + offsetX}px`;
            factory.style.top = `${centerY}px`;

            container.appendChild(factory);
        }

        // Рахуємо дохід ЛИШЕ для тієї країни, за яку зараз грає гравець
        function calculatePlayerIncome() {
            let totalFactories = 0;
            for (const id in provinceData) {
                if (provinceData[id].country === playerCountry) {
                    totalFactories += provinceData[id].factories;
                }
            }
            return totalFactories * 5; 
        }

        function updateIncomeDisplay() {
            incomeDisplay.textContent = `+${calculatePlayerIncome()}`;
        }

        // Щомиті додаємо золото в бюджет гравця
        setInterval(function() {
            const income = calculatePlayerIncome();
            coins += income;
            coinsDisplay.textContent = coins;
        }, 1000);
    });
</script>
</body>
</html>
