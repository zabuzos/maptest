<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        /* Ігрова панель управління */
        .control-panel {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #16161a;
            padding: 12px 24px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2a2a30;
        }

        .stats {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        .mode-btn {
            background-color: #222227;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .mode-btn.build-mode.active {
            background-color: #f97316;
            border-color: #fb923c;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .map-container {
            position: relative; /* Потрібно для абсолютного позиціонування заводів */
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        /* Стилі для провінцій */
        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer;
            stroke: #222222;
            stroke-width: 0.5px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover, svg polygon:hover, svg rect:hover {
            opacity: 0.75;
            stroke: #ffffff;
        }

        /* Візуальні заводи на карті */
        .factory-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f97316;
            border: 1px solid #ffffff;
            border-radius: 50%;
            pointer-events: none; /* Щоб заводи не перекривали кліки по карті */
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #f97316;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія</h1>
    <p>Керуйте державою, розширюйте території та будуйте індустрію.</p>

    <!-- Ігрова панель -->
    <div class="control-panel">
        <div class="stats">
            Монети: <span id="coins-display">0</span> (<span id="income-display">+0</span>/с)
        </div>
        <div>
            <button id="btn-capture" class="mode-btn active">Режим: Захоплення</button>
            <button id="btn-build" class="mode-btn build-mode">Режим: Будівництво заводів</button>
        </div>
    </div>

    <div id="map-container" class="map-container"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const coinsDisplay = document.getElementById('coins-display');
        const incomeDisplay = document.getElementById('income-display');
        const btnCapture = document.getElementById('btn-capture');
        const btnBuild = document.getElementById('btn-build');

        // Ігрові змінні
        let coins = 0;
        let currentMode = 'capture'; // 'capture' або 'build'
        const targetColor = "#555555"; // Колір захопленої провінції
        
        // База даних провінцій (тут зберігатиметься к-сть заводів)
        const provinceData = {}; 

        // Перемикання режимів
        btnCapture.addEventListener('click', () => {
            currentMode = 'capture';
            btnCapture.classList.add('active');
            btnBuild.classList.remove('active');
        });

        btnBuild.addEventListener('click', () => {
            currentMode = 'build';
            btnBuild.classList.add('active');
            btnCapture.classList.remove('active');
        });

        // 1. Завантажуємо зовнішній файл карти map.svg
        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                container.innerHTML = svgData;

                // Знаходимо головний шар CorelDRAW або сам SVG
                const mapLayer = document.getElementById('Layer_x0020_1') || container.querySelector('svg');

                if (mapLayer) {
                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        const target = event.target;
                        
                        if (validTags.includes(target.tagName.toLowerCase())) {
                            // Генеруємо унікальний ID, якщо його немає у фігури
                            if (!target.id) {
                                target.id = 'prov_' + Math.random().toString(36).substr(2, 9);
                            }
                            
                            const provinceId = target.id;

                            // Ініціалізуємо дані провінції в пам'яті, якщо їх ще немає
                            if (!provinceData[provinceId]) {
                                provinceData[provinceId] = { captured: false, factories: 0 };
                            }

                            // --- ЛОГІКА РЕЖИМІВ ---
                            if (currentMode === 'capture') {
                                // Режим ЗАХОПЛЕННЯ
                                target.style.fill = targetColor;
                                provinceData[provinceId].captured = true;
                                console.log("Захоплено провінцію: " + provinceId);

                            } else if (currentMode === 'build') {
                                // Режим БУДІВНИЦТВА
                                // Будувати можна лише у захоплених провінціях (можна прибрати цю умову, якщо дозволено всюди)
                                if (!provinceData[provinceId].captured) {
                                    alert("Спочатку захопіть цю провінцію в режимі 'Захоплення'!");
                                    return;
                                }

                                // Обмеження: макс. 3 заводи на провінцію (щоб не захаращувати карту)
                                if (provinceData[provinceId].factories < 3) {
                                    provinceData[provinceId].factories++;
                                    
                                    // Створюємо заводик на карті
                                    createFactoryVisual(target);
                                    
                                    console.log(`У провінції ${provinceId} побудовано завод. Всього: ${provinceData[provinceId].factories}`);
                                    updateIncomeDisplay();
                                } else {
                                    console.log("Досягнуто ліміт заводів у цій провінції!");
                                }
                            }
                        }
                    });
                } else {
                    console.error("Помилка: Не вдалося знайти векторний шар всередині SVG.");
                }
            })
            .catch(error => {
                console.error("Помилка завантаження файлу карти:", error);
                container.innerHTML = "<p style='color:red;'>Не вдалося завантажити карту map.svg. Перевірте, чи лежить файл у тій же папці.</p>";
            });

        // Функція для додавання помаранчевої цятки (заводу) по центру провінції
        function createFactoryVisual(svgElement) {
            const rect = svgElement.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            // Знаходимо центр провінції відносно контейнера карти
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            // Створюємо HTML елемент заводу
            const factory = document.createElement('div');
            factory.className = 'factory-indicator';
            
            // Невеликий випадковий зсув (хаос), якщо заводів декілька, щоб вони не зливалися в одну точку
            const factoryCount = provinceData[svgElement.id].factories;
            const offsetX = (factoryCount - 2) * 10; // Розставляє їх в ряд

            factory.style.left = `${centerX + offsetX}px`;
            factory.style.top = `${centerY}px`;

            container.appendChild(factory);
        }

        // Підрахунок загального прибутку за секунду
        function calculateTotalIncome() {
            let totalFactories = 0;
            for (const id in provinceData) {
                totalFactories += provinceData[id].factories;
            }
            return totalFactories * 5; // Кожен завод дає 5 монет
        }

        // Оновлення тексту прибутку (+Х/с)
        function updateIncomeDisplay() {
            incomeDisplay.textContent = `+${calculateTotalIncome()}`;
        }

        // Ігровий таймер: виконується раз на секунду (1000 мс)
        setInterval(function() {
            const income = calculateTotalIncome();
            coins += income;
            coinsDisplay.textContent = coins;
        }, 1000);
    });
</script>
</body>
</html>
