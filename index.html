<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегічна Карта Європи</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #8a8a93; font-size: 14px; }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            background: #16161a;
            padding: 12px 24px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2a2a30;
            z-index: 10;
        }

        .panel-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        select {
            background-color: #222227;
            color: white;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn {
            background-color: #222227;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .mode-btn.build-mode.active {
            background-color: #f97316;
            border-color: #fb923c;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .map-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            border: 2px solid #2a2a30;
            background-color: #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 10px;
        }

        svg path, svg polygon, svg polyline, svg rect, svg ellipse {
            cursor: pointer;
            stroke: #111113;
            stroke-width: 0.6px;
            transition: opacity 0.15s ease, stroke 0.15s ease;
        }

        svg path:hover, svg polygon:hover, svg rect:hover {
            opacity: 0.85;
            stroke: #ffffff;
        }

        /* Помаранчеві заводи */
        .factory-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f59e0b;
            border: 1px solid #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #f59e0b;
        }

        /* Дивізії стрільців */
        .division-indicator {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #10b981;
            filter: drop-shadow(0 0 4px #10b981);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 5;
            transition: left 0.1s linear, top 0.1s linear;
        }

        .division-indicator.selected {
            border-bottom-color: #ffff00;
            filter: drop-shadow(0 0 6px #ffff00);
        }

        /* Окремий SVG-шар для стрілок переміщення військ */
        .arrows-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            pointer-events: none;
            z-index: 4;
        }
    </style>
</head>
<body>

    <h1>Глобальна Стратегія</h1>
    <p>Клікніть на дивізію, а потім на СУСІДНЮ провінцію. Стрілка покаже час маршу.</p>

    <div class="control-panel">
        <div class="panel-section">
            <label for="country-select">Ваша країна:</label>
            <select id="country-select">
                <option value="UA">Україна (UA)</option>
                <option value="PL">Польща (PL)</option>
                <option value="DE">Німеччина (DE)</option>
                <option value="FR">Франція (FR)</option>
            </select>
        </div>

        <div class="panel-section stats">
            Монети: <span id="coins-display">150</span> (<span id="income-display">+0</span>/с)
        </div>

        <div class="panel-section">
            <button id="btn-army" class="mode-btn active">Режим: Стрільці</button>
            <button id="btn-build" class="mode-btn build-mode">Режим: Промисловість</button>
        </div>
    </div>

    <div id="map-container" class="map-container">
        <svg id="arrows-layer" class="arrows-layer"></svg>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('map-container');
        const arrowsLayer = document.getElementById('arrows-layer');
        const coinsDisplay = document.getElementById('coins-display');
        const incomeDisplay = document.getElementById('income-display');
        const btnArmy = document.getElementById('btn-army');
        const btnBuild = document.getElementById('btn-build');
        const countrySelect = document.getElementById('country-select');

        let coins = 150;
        let currentMode = 'army';
        let playerCountry = countrySelect.value;
        let selectedProvinceId = null;

        // Максимальна відстань між центрами для визначення сусідства (налаштуйте під свою карту)
        const MAX_NEIGHBOR_DISTANCE = 180; 
        // Швидкість руху: скільки мілісекунд займає подолання 1 пікселя відстані
        const MS_PER_PIXEL = 20; 

        const countryColors = {
            'UA': '#1d4ed8', 'PL': '#b91c1c', 'DE': '#374151', 'FR': '#0284c7', 'NEUTRAL': '#2e2e35'
        };
        
        const provinceData = {}; 

        countrySelect.addEventListener('change', function() {
            playerCountry = this.value;
            cancelSelection();
            updateIncomeDisplay();
        });

        btnArmy.addEventListener('click', () => { currentMode = 'army'; btnArmy.classList.add('active'); btnBuild.classList.remove('active'); });
        btnBuild.addEventListener('click', () => { currentMode = 'build'; btnBuild.classList.add('active'); btnArmy.classList.remove('active'); cancelSelection(); });

        fetch('map.svg')
            .then(response => response.text())
            .then(svgData => {
                // Вшиваємо мапу, але зберігаємо наш шар стрілок
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgData, 'image/svg+xml');
                const importedSvg = svgDoc.querySelector('svg');
                
                // Переносимо вміст завантаженого SVG в контейнер
                container.insertBefore(importedSvg, arrowsLayer);

                const mapLayer = document.getElementById('Layer_x0020_1') || importedSvg;

                if (mapLayer) {
                    // Конфігуруємо маркер стрілки для HoI4 ефекту
                    setupArrowMarker();

                    const allElements = mapLayer.querySelectorAll('path, polygon, polyline, rect, ellipse');
                    allElements.forEach(element => {
                        if (!element.id) element.id = 'prov_' + Math.random().toString(36).substr(2, 5);
                        const id = element.id;
                        let detectedCountry = 'NEUTRAL';

                        for (const code in countryColors) {
                            if (id.endsWith('_' + code) || id.endsWith(code)) {
                                detectedCountry = code;
                                break;
                            }
                        }

                        provinceData[id] = {
                            country: detectedCountry,
                            factories: 0,
                            hasDivision: false,
                            isMoving: false, // Чи йде зараз марш
                            elementRef: element,
                            domDivisionRef: null
                        };

                        element.style.fill = countryColors[detectedCountry];
                    });

                    updateIncomeDisplay();

                    mapLayer.addEventListener('click', function(event) {
                        const validTags = ['path', 'polygon', 'polyline', 'rect', 'ellipse'];
                        const target = event.target;
                        if (!validTags.includes(target.tagName.toLowerCase())) return;
                        
                        const provinceId = target.id;
                        const province = provinceData[provinceId];
                        if (!province || province.isMoving) return;

                        if (currentMode === 'build') {
                            if (province.country !== playerCountry) return alert("Тільки на своїй території!");
                            if (province.factories < 3) {
                                province.factories++;
                                createFactoryVisual(target, provinceId);
                                updateIncomeDisplay();
                            }
                        } 
                        else if (currentMode === 'army') {
                            if (province.country === playerCountry) {
                                if (province.hasDivision) {
                                    cancelSelection();
                                    selectedProvinceId = provinceId;
                                    province.domDivisionRef.classList.add('selected');
                                } else {
                                    if (selectedProvinceId && selectedProvinceId !== provinceId) {
                                        tryMoveOrAttack(selectedProvinceId, provinceId);
                                    } else if (coins >= 50) {
                                        coins -= 50; coinsDisplay.textContent = coins;
                                        spawnDivisionVisual(provinceId);
                                    }
                                }
                            } else {
                                if (selectedProvinceId) {
                                    tryMoveOrAttack(selectedProvinceId, provinceId);
                                }
                            }
                        }
                    });
                }
            });

        // Маркер стрілочки в кінці лінії
        function setupArrowMarker() {
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
            marker.setAttribute("id", "arrowhead");
            marker.setAttribute("viewBox", "0 0 10 10");
            marker.setAttribute("refX", "5");
            marker.setAttribute("refY", "5");
            marker.setAttribute("markerWidth", "6");
            marker.setAttribute("markerHeight", "6");
            marker.setAttribute("orient", "auto-start-reverse");
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
            path.setAttribute("fill", "#f59e0b");
            
            marker.appendChild(path);
            defs.appendChild(marker);
            arrowsLayer.appendChild(defs);
        }

        // Отримання центру провінції
        function getProvinceCenter(id) {
            const rect = provinceData[id].elementRef.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            return {
                x: rect.left - containerRect.left + (rect.width / 2),
                y: rect.top - containerRect.top + (rect.height / 2)
            };
        }

        // Перевірка сусідства та запуск переміщення/атаки
        function tryMoveOrAttack(fromId, toId) {
            const start = getProvinceCenter(fromId);
            const end = getProvinceCenter(toId);

            // Вираховуємо дистанцію по формулі Гіпотенузи
            const distance = Math.sqrt(Math.pow(end.x - start.x, 2) + Math.pow(end.y - start.y, 2));

            // Перевірка на межування
            if (distance > MAX_NEIGHBOR_DISTANCE) {
                alert("Провінція занадто далеко! Рухатися можна тільки в межуючі (сусідні) провінції.");
                cancelSelection();
                return;
            }

            if (provinceData[toId].hasDivision) {
                alert("Ця провінція вже зайнята військами!");
                cancelSelection();
                return;
            }

            const travelTime = distance * MS_PER_PIXEL; // Час у мілісекундах
            executeOrderWithArrow(fromId, toId, start, end, travelTime);
        }

        // Малювання ХоІ4 стрілки та процес переміщення
        function executeOrderWithArrow(fromId, toId, start, end, duration) {
            const fromProv = provinceData[fromId];
            const toProv = provinceData[toId];
            
            fromProv.isMoving = true;
            cancelSelection();

            // Створюємо SVG групу для анімованої стрілки
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            // Задній напівпрозорий шлях стрілки
            const bgLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            bgLine.setAttribute("x1", start.x); bgLine.setAttribute("y1", start.y);
            bgLine.setAttribute("x2", end.x); bgLine.setAttribute("y2", end.y);
            bgLine.setAttribute("stroke", "rgba(245, 158, 11, 0.2)");
            bgLine.setAttribute("stroke-width", "6");
            bgLine.setAttribute("stroke-dasharray", "5,5");

            // Передній заповнюваний шлях (Прогрес-бар)
            const progressLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            progressLine.setAttribute("x1", start.x); progressLine.setAttribute("y1", start.y);
            progressLine.setAttribute("x2", start.x); progressLine.setAttribute("y2", start.y); // Починаємо з нуля
            progressLine.setAttribute("stroke", "#f59e0b");
            progressLine.setAttribute("stroke-width", "6");
            progressLine.setAttribute("marker-end", "url(#arrowhead)");

            g.appendChild(bgLine);
            g.appendChild(progressLine);
            arrowsLayer.appendChild(g);

            const startTime = performance.now();
            const divEl = fromProv.domDivisionRef;

            // Рендер кадрів анімації
            function animateMove(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Поточні координати дивізії в дорозі
                const currentX = start.x + (end.x - start.x) * progress;
                const currentY = start.y + (end.y - start.y) * progress;

                // Оновлюємо стрілку прогресу та позицію юніта
                progressLine.setAttribute("x2", currentX);
                progressLine.setAttribute("y2", currentY);
                divEl.style.left = `${currentX}px`;
                divEl.style.top = `${currentY}px`;

                if (progress < 1) {
                    requestAnimationFrame(animateMove);
                } else {
                    // Кінець руху
                    g.remove(); // Видаляємо стрілку
                    
                    fromProv.hasDivision = false;
                    fromProv.domDivisionRef = null;
                    fromProv.isMoving = false;

                    // Якщо провінція була ворожою — Атака (захоплення)
                    if (toProv.country !== playerCountry) {
                        toProv.country = playerCountry;
                        toProv.elementRef.style.fill = countryColors[playerCountry];
                        updateIncomeDisplay();
                    }

                    toProv.hasDivision = true;
                    toProv.domDivisionRef = divEl;
                }
            }

            requestAnimationFrame(animateMove);
        }

        function spawnDivisionVisual(id) {
            const center = getProvinceCenter(id);
            const divEl = document.createElement('div');
            divEl.className = 'division-indicator';
            divEl.style.left = `${center.x}px`;
            divEl.style.top = `${center.y}px`;
            container.appendChild(divEl);
            
            provinceData[id].hasDivision = true;
            provinceData[id].domDivisionRef = divEl;
        }

        function createFactoryVisual(svgElement, id) {
            const rect = svgElement.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + (rect.width / 2);
            const centerY = rect.top - containerRect.top + (rect.height / 2);

            const factory = document.createElement('div');
            factory.className = 'factory-indicator';
            const offsetX = (provinceData[id].factories - 2) * 11; 
            factory.style.left = `${centerX + offsetX}px`;
            factory.style.top = `${centerY + 14}px`; 
            container.appendChild(factory);
        }

        function cancelSelection() {
            selectedProvinceId = null;
            document.querySelectorAll('.division-indicator').forEach(el => el.classList.remove('selected'));
        }

        function calculatePlayerIncome() {
            let totalFactories = 0;
            for (const id in provinceData) {
                if (provinceData[id].country === playerCountry) totalFactories += provinceData[id].factories;
            }
            return totalFactories * 5; 
        }

        function updateIncomeDisplay() { incomeDisplay.textContent = `+${calculatePlayerIncome()}`; }

        setInterval(function() {
            coins += calculatePlayerIncome();
            coinsDisplay.textContent = coins;
        }, 1000);
    });
</script>
</body>
</html>
